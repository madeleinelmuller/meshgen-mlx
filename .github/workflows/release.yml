name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.7.1)"
        required: true
        default: "v0.7.1"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - filename: mlx-macos-arm
            os: macos-latest
            requirements: mlx.txt

    runs-on: ${{ matrix.platform.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: meshgen

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools tomli tomli-w

      - name: Install Blender (macOS)
        run: |
          brew install --cask blender@lts
          if [ "$(uname -m)" == "arm64" ]; then
            echo "/opt/homebrew/bin" >> $GITHUB_PATH
          else
            echo "/usr/local/bin" >> $GITHUB_PATH
          fi

      - name: Download wheels
        working-directory: meshgen
        run: |
          python -m pip wheel \
            -r requirements/${{ matrix.platform.requirements }} \
            --wheel-dir wheels

      - name: Update manifest with wheel list
        working-directory: meshgen
        run: |
          python -c "
          import tomli, tomli_w, os
          with open('blender_manifest.toml', 'rb') as f:
              manifest = tomli.load(f)
          manifest['wheels'] = ['wheels/' + w for w in os.listdir('wheels')]
          with open('blender_manifest.toml', 'wb') as f:
              tomli_w.dump(manifest, f)
          "

      - name: Build extension
        working-directory: meshgen
        run: blender --command extension build

      - name: Rename artifact
        run: mv meshgen/meshgen-*.zip meshgen-${{ matrix.platform.filename }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: meshgen-${{ matrix.platform.filename }}
          path: meshgen-${{ matrix.platform.filename }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          files: "*.zip"
